version: '3.9'

services:
  backend:
    build: ./backend
    container_name: talentiq-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_PATH=/app/qdrant_storage
      - COLLECTION_NAME=talentiq_candidates
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
    volumes:
      - qdrant_data:/app/qdrant_storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: talentiq-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local
